<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chestionar</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="app-wrapper">
        <h1 id="title">Chestionar pentru vizitatorii site-ului</h1>
        <p id="description">Bună ziua!<br>Vă rog să alocați câteva minute pentru a completa următorul sondaj.</br></p>
        <form id="survey-form">
            
            <div class="input-element">
                <label class="name-label">
                    Nume
                </label>
                <input placeholder="nume" id="nume" type="text" required/>
            </div>

            <div class="input-element">
                <label class="name-label">
                    Prenume
                </label>
                <input placeholder="prenume" id="prenume" type="text" required/>
            </div>

            <div class="input-element">
                <label class="email-label">
                    Email
                </label>
                <input placeholder="email" id="email" type="email" required/>
            </div>

            <div class="input-element">
                <label class="number-label">
                    Vârstă
                </label>
                <input placeholder="vârstă" id="number" min="5" max="100" type="number" required/>
            </div>

            <div class="input-element">
                <label class="select-label">
                   În ce calitate ați vizitat site-ul?
                </label>
                <select id="dropdown">
                    <option>Ca și localnic</option>
                    <option>Ca și turist</option>
                </select>
            </div>

            <div class="input-element">
                <label class="select-label">
                    De ce ați vizitat site-ul?
                </label>
                <select id="dropdown">
                    <option>Pentru a găsi informații despre călătorii locale și despre regiune</option>
                    <option>Pentru a găsi informații despre evenimente culturale în regiune</option>
                    <option>Pentru a accesa internetul</option>
                </select>
            </div>

            <div class="input-element">
                <label> Ați găsit ce informație căutați?</label>
                <div>
                    <label><input type="radio" name="servici" value="yes"/>Yes</label>
                </div>
                <div>
                    <label><input type="radio" name="servici" value="no"/>No</label>
                </div>
            </div>

            <div class="input-element">
                <label> Ați spune că site-ul a fost util pentru dvs.?</label>
                <div>
                    <label><input type="radio" name="servici" value="yes"/>Yes</label>
                </div>
                <div>
                    <label><input type="radio" name="servici" value="no"/>No</label>
                </div>
            </div>

            <div class="input-element">
                <label>Ce oraș v-a atras atenția?</label>
                <div>
                    <label><input type="checkbox" name="ideas" value="calls"/>Roma</label>
                </div>
                <div>
                    <label><input type="checkbox" name="ideas" value="calls"/>Milano</label>
                </div>
                <div>
                    <label><input type="checkbox" name="ideas" value="calls"/>Napoli</label>
                </div>
                <div>
                    <label><input type="checkbox" name="ideas" value="calls"/>Torino</label>
                </div>
                <div>
                    <label><input type="checkbox" name="ideas" value="calls"/>Palermo</label>
                </div>
            </div>

            <div class="input-element">
                <label>Alte întrebări</label>
                <textarea type="text"></textarea>
            </div>

            <button type="submit" id="submit">Trimite</button>

        </form>
    </div>
</body>
</html>
